<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiz App</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="quiz-container">
    
    <h1>Quiz App</h1>

    <div class="quiz-box">

      <h2 class="question">What is the capital of Bangladesh?</h2>

      <div class="options">
        <label>
          <input type="radio" name="option"/>
          Dhaka
        </label>

        <label>
          <input type="radio" name="option"/>
          Chittagong
        </label>

        <label>
          <input type="radio" name="option"/>
          Khulna
        </label>

        <label>
          <input type="radio" name="option"/>
          Rajshahi
        </label>
      </div>
      <button class="btn"> Next Question </button>

    </div>

  </div>
  <script src="script.js" ></script>
</body>
</html>
