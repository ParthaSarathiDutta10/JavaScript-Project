<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="game">
        <div class="rock">
            <h1>Rock</h1>
            <img src="img/rock.png" alt="">
        </div>
        <div class="paper">
            <h1>Paper</h1>
            <img src="img/paper.png" alt="">
        </div>
        <div class="scissors">
            <h1>Scissors</h1>
            <img src="img/scissor.png" alt="">
        </div>
    </div>
    <div id="demo"></div>

    <div class="point-counter">
        <div class="user">
            <img src="img/user.png" alt="">
            <h1>Your Point: <span id="user-point"></span></h1>
        </div>
        <div class="computer">
            <img src="img/computer.png" alt="">
            <h1> Computer Point: <span id="computer-point"></span></h1>
        </div>
    </div>
    
    <script src="app.js" ></script>
</body>
</html>
