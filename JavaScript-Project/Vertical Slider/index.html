<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vertical Slider</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="slider-container">
        <div class="left-slide">
              <div style="background-color: rgb(255, 31, 10);" >
                <h1>Nature Flower</h1>
                <p>all in pink</p>
            </div>
            <div style="background-color: rgb(10, 132, 255);" >
                <h1>Blueee Sky</h1>
                <p>with it's mountains</p>
            </div>
            <div style="background-color: rgba(42, 9, 7, 0.405);" >
                <h1>Flying Eagle</h1>
                <p>in the sunset</p>
            </div>
            <div style="background-color: rgb(255, 157, 10);" >
                <h1>Lonely Castle</h1>
                <p>in the wilderness</p>
            </div>
        </div>


        <div class="right-slide">
            <div class="slide-1 slide"></div>
            <div class="slide-2 slide"></div>
            <div class="slide-3 slide"></div>
            <div class="slide-4 slide"></div>
        </div>


        <div class="action-buttons">
            <button class="down-button" >&#8595;</button>
            <button class="up-button" >&uarr;</button>
        </div>
    </div>

    <script src="app.js" ></script>
</body>
</html>
