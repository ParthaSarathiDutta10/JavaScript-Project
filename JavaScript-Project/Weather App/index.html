<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
      
                <div class="header-area">
                    <div class="data-area">
                        <h1 class="city" > </h1>
                    </div>
                    <div class="input-area">
                        <input id="input" type="text" placeholder="Enter City Name...">
                        <button id="search" >Search</button>
                    </div>
                </div>
                <div class="weather">
                    <div class="mid-area">
                            <div class="temp">-/-</div>
                            <div ><img class="weather-condition" src="img/weather-news.png" alt=""></div>
                    </div>
                <div class="bottom-area">
                        <div class=""><img src="img/atmospheric-conditions.png" alt="">
                            <p class="feels" >-/-</p>
                        </div>
                        <div><img src="img/humidity.png" alt="">
                            <p class="humidity">-/-</p>
                        </div>
                        <div ><img src="img/wind.png" alt="">
                            <p class="wind">-/-</p>
                        </div>
                        <div><img src="img/pressure.png" alt="">
                            <p class="pressure" >-/-</p>
                        </div>
                    </div>
                </div>
    </div>

    <script src="app.js" ></script>
</body>
</html>
